[build]
  # This tells Netlify where to find your serverless functions
  functions = "netlify/functions"

[dev]
  # This helps the Netlify CLI simulate the production environment locally
  functions = "netlify/functions"
  port = 8888 # Default port for 'netlify dev'

[[plugins]]
  package = "@netlify/plugin-nextjs"

# The most important part: redirect rules
[[redirects]]
  from = "/api/*"
  to = "/netlify/functions/api/:splat" # :splat is a wildcard that captures everything after '/api/'
  status = 200
